services:
  db:
    image: postgres:15
    container_name: collaborative_db
    environment:
      POSTGRES_DB: collaborative_db
      POSTGRES_USER: Sergio
      POSTGRES_PASSWORD: SxD13052023
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: collaborative_redis
    ports:
      - "6379:6379"

  web:
    build:
      context: .
      dockerfile: Dockerfile # Asegúrate de que el nombre coincida
    container_name: collaborative_backend
    # Sobrescribimos para usar desarrollo
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.dev
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    # En desarrollo, sí podemos forzar migraciones al arrancar
    command: >
      sh -c "python manage.py migrate && 
             python manage.py collectstatic --noinput && 
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"

volumes:
  postgres_data: